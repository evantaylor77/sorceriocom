name: Scrape Twitter Videos

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install undetected-chromedriver selenium requests

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run scraper
        run: |
          cd scraper
          python twitter_scraper.py buzzhaber
        env:
          PYTHONUNBUFFERED: 1

      - name: Check for changes
        id: check_changes
        run: |
          git add data/tweets.json data/videos/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update videos from @buzzhaber [skip ci]"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/tweets.json ]; then
            TWEET_COUNT=$(jq length data/tweets.json 2>/dev/null || echo "0")
            echo "- Tweets scraped: $TWEET_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d data/videos ]; then
            VIDEO_COUNT=$(ls -1 data/videos/*.mp4 2>/dev/null | wc -l || echo "0")
            echo "- Videos downloaded: $VIDEO_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
