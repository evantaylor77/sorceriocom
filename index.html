<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzHaber - Son Dakika Haberleri</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">BuzzHaber</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-link active">Haberler</a>
                <a href="#" class="nav-link">Gündem</a>
                <a href="#" class="nav-link">Spor</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="news-feed" id="newsFeed">
                <!-- Haber kartları buraya yüklenecek -->
            </div>

            <div class="load-more-container">
                <button class="load-more-btn" id="loadMoreBtn">
                    <span>Devamını Yükle</span>
                    <span>↓</span>
                </button>
                <div class="loader" id="loader" style="display: none;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 BuzzHaber - BuzzFinal entegrasyonlu haber platformu</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
